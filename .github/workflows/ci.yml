# Code scanning false positive ignore: SonarQube Docs API Key
# The following SHA references are not secrets, but workflow version pins for tf-sonar.yml reusable workflow.


  name: CI

  on:
    pull_request:
      branches: [main]

  permissions:
    contents: read
    actions: read
    security-events: write
    issues: write
    pull-requests: write

  jobs:
    check-workflow-syntax:
      runs-on: ubuntu-latest
      steps:
        - name: Check workflow syntax
          run: echo "Workflow syntax is valid"
    general-workflows-policy:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@fc5fcac8c2cfe0ccd8d18b73383df445ec31e371 # main
    codeql-actions:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@fc5fcac8c2cfe0ccd8d18b73383df445ec31e371 # main
      with:
        languages: actions
        source-root: .
        upload-sarif: false
    fmt:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-fmt.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        working-directory: examples/hello
    validate:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-validate.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        chdir: examples/hello/stack
    lint:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-lint.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        lint-path: examples/hello
        tflint-config: examples/hello/.tflint.hcl
    docs:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-docs.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        working-directory: examples/hello
        output-file: README.md
    security:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-security.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        scan-ref: examples/hello
        upload-sarif: false
    tfsec:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-tfsec.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        scan-path: examples/hello
    checkov:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-checkov.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        scan-directory: examples/hello
    test-tidy:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-test-tidy.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        test-dir: examples/hello/test
        go-version: "1.25.8"
    semgrep:
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-semgrep.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        working-directory: examples/hello
    # code scanning false positive ignore: SonarQube Docs API Key
    # The following SHA reference is not a secret, but a workflow version pin for tf-sonar.yml reusable workflow.
    sonar:
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
      permissions:
        contents: read
        actions: read
        security-events: write
        issues: write
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-sonar.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        working-directory: examples/hello
      secrets:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    plan-dry-run:
      permissions:
        id-token: write
        contents: read
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-plan.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        environment: dev
        chdir: examples/hello/stack
        dry-run: true
    drift-dry-run:
      permissions:
        id-token: write
        contents: read
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-drift.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        environment: dev
        chdir: examples/hello/stack
        dry-run: true
    apply-dry-run:
      permissions:
        id-token: write
        contents: read
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-apply.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        environment: dev
        chdir: examples/hello/stack
        dry-run: true
    destroy-dry-run:
      permissions:
        id-token: write
        contents: read
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-destroy.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        environment: dev
        chdir: examples/hello/stack
        dry-run: true
    cost-dry-run:
      permissions:
        id-token: write
        contents: read
        pull-requests: write
      uses: FelipeFuhr/ffreis-workflows-terraform/.github/workflows/tf-cost.yml@ff8eb93a653fee48091619bb9ec88abafa8d4cd5 # main
      with:
        path: examples/hello/stack
        dry-run: true
