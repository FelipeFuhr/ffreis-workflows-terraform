name: DevOps / PR Labeler

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-labeler.yml@ffreis/labeler-fix
    with:
      rules-json: |-
        [
          {"label":"ci","patterns":[".github/workflows/**",".github/actions/**"]},
          {"label":"terraform","patterns":["**/*.tf","stack/**","modules/**"]},
          {"label":"examples","patterns":["examples/**"]},
          {"label":"scripts","patterns":["scripts/**","Makefile","lefthook.yml"]},
          {"label":"docs","patterns":["**/*.md"]}
        ]
