name: DevOps / Security

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4 # v1.0.3
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}

  trivy-fs:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scan-trivy-fs.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4 # v1.0.3
    with:
      scan-ref: "."
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}

  grype-fs:
    name: Grype (fs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Grype
        run: |
          set -euo pipefail
          PINNED_COMMIT="dee8de483dfba5b4e0bc0aa8e4ab2ce52137e490"
          SCRIPT_URL="https://raw.githubusercontent.com/anchore/grype/${PINNED_COMMIT}/install.sh"
          mkdir -p ./bin
          curl --fail --show-error --silent --location \
            --proto '=https' --proto-redir '=https' \
            "$SCRIPT_URL" -o /tmp/grype-install.sh
          grep -q "grype" /tmp/grype-install.sh
          sh /tmp/grype-install.sh -b ./bin
          ./bin/grype version

      - name: Run Grype (filesystem)
        env:
          FAIL_ON_VULN: ${{ github.event_name != 'pull_request' }}
        run: |
          set -euo pipefail
          set +e
          ./bin/grype "dir:." \
            --fail-on "high" \
            -o table \
            -o "sarif=grype.sarif" \
            2> grype.stderr.log
          exit_code="$?"
          set -e
          if ! test -s grype.sarif; then
            echo "::error::grype.sarif was not generated or is empty"
            if test -s grype.stderr.log; then
              echo "::group::grype stderr"
              cat grype.stderr.log || true
              echo "::endgroup::"
            fi
            exit 1
          fi
          if [[ "$exit_code" -ne 0 ]]; then
            if [[ "$FAIL_ON_VULN" == "true" ]]; then
              exit "$exit_code"
            fi
            echo "::warning::Grype found vulnerabilities (exit=$exit_code) but fail-on-vuln=false; continuing."
          fi

      - name: Print Grype stderr log
        if: always()
        shell: bash
        run: |
          if [[ -s grype.stderr.log ]]; then
            echo "::group::Grype stderr log"
            cat grype.stderr.log
            echo "::endgroup::"
          fi

      - name: Upload SARIF
        if: always() && hashFiles('grype.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: grype.sarif
          category: grype-fs

  osv:
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-osv-scanner.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4 # v1.0.3
    with:
      working-directory: "."
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
