name: Self Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  security-events: write

# Validates the static-analysis and security workflows against examples/hello/.
#
# tf-sonar requires SONAR_TOKEN to be configured in the repository. The job
# is skipped on fork pull requests (secrets are not available to forks), but
# runs on all other events and fails if the token is absent.
#
# The AWS-backed workflows (tf-plan/apply/destroy/drift/cost) are exercised in
# `dry-run: true` mode so the workflow wiring is continuously validated without
# requiring live infrastructure or secrets.

jobs:
  workflows-policy:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@v0.1.7

  codeql-actions:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@v0.1.7
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  fmt:
    uses: ./.github/workflows/tf-fmt.yml
    with:
      working-directory: examples/hello

  validate:
    uses: ./.github/workflows/tf-validate.yml
    with:
      chdir: examples/hello/stack

  lint:
    uses: ./.github/workflows/tf-lint.yml
    with:
      lint-path: examples/hello
      tflint-config: examples/hello/.tflint.hcl

  docs:
    uses: ./.github/workflows/tf-docs.yml
    with:
      working-directory: examples/hello
      output-file: README.md

  security:
    uses: ./.github/workflows/tf-security.yml
    with:
      scan-ref: examples/hello

  tfsec:
    uses: ./.github/workflows/tf-tfsec.yml
    with:
      scan-path: examples/hello

  checkov:
    uses: ./.github/workflows/tf-checkov.yml
    with:
      scan-directory: examples/hello

  test-tidy:
    uses: ./.github/workflows/tf-test-tidy.yml
    with:
      test-dir: examples/hello/test

  semgrep:
    uses: ./.github/workflows/tf-semgrep.yml
    with:
      working-directory: examples/hello

  sonar:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/tf-sonar.yml
    with:
      working-directory: examples/hello
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  plan-dry-run:
    uses: ./.github/workflows/tf-plan.yml
    with:
      environment: dev
      chdir: examples/hello/stack
      dry-run: true

  drift-dry-run:
    uses: ./.github/workflows/tf-drift.yml
    with:
      environment: dev
      chdir: examples/hello/stack
      dry-run: true

  apply-dry-run:
    uses: ./.github/workflows/tf-apply.yml
    with:
      environment: dev
      chdir: examples/hello/stack
      dry-run: true

  destroy-dry-run:
    uses: ./.github/workflows/tf-destroy.yml
    with:
      environment: dev
      chdir: examples/hello/stack
      dry-run: true

  cost-dry-run:
    uses: ./.github/workflows/tf-cost.yml
    with:
      path: examples/hello/stack
      dry-run: true
