name: Terraform Apply

on:
  workflow_call:
    inputs:
      terraform-version:
        description: "Terraform version to use"
        type: string
        default: "1.9.8"
      environment:
        description: "e.g. dev, staging, prod"
        type: string
        required: true
      chdir:
        description: "Terraform root module directory relative to repo root"
        type: string
        default: "infra/stack"
      aws-region:
        description: "AWS region"
        type: string
        default: "us-east-1"
      auto-approve:
        description: "Pass -auto-approve to terraform apply (plan-file based apply is not supported; use auto-approve: true)"
        type: boolean
        default: true
      dry-run:
        description: "If true, validates configuration without requiring AWS credentials/state"
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        required: false

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Require AWS_ROLE_ARN (when dry-run=false)
        if: ${{ !inputs.dry-run }}
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail
          if [[ -z "$AWS_ROLE_ARN" ]]; then
            echo "::error::Missing required secret AWS_ROLE_ARN"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ !inputs.dry-run }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: github-${{ github.run_id }}-${{ inputs.environment }}-apply

      - name: Terraform init
        env:
          CHDIR: ${{ inputs.chdir }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" ]]; then
            terraform -chdir="$CHDIR" init -backend=false -input=false
          else
            terraform -chdir="$CHDIR" init -input=false
          fi

      - name: Terraform validate (dry-run)
        if: ${{ inputs.dry-run }}
        env:
          CHDIR: ${{ inputs.chdir }}
        run: |
          set -euo pipefail
          terraform -chdir="$CHDIR" validate -no-color

      - name: Terraform apply (auto-approve)
        if: ${{ inputs.auto-approve && !inputs.dry-run }}
        env:
          CHDIR: ${{ inputs.chdir }}
        run: |
          set -euo pipefail
          terraform -chdir="$CHDIR" apply -auto-approve -input=false

      - name: Terraform apply (interactive)
        if: ${{ !inputs.auto-approve && !inputs.dry-run }}
        env:
          CHDIR: ${{ inputs.chdir }}
        run: |
          set -euo pipefail
          terraform -chdir="$CHDIR" apply -input=false
