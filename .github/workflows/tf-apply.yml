name: Terraform Apply

on:
  workflow_call:
    inputs:
      terraform-version:
        description: "Terraform version to use"
        type: string
        default: "1.9.8"
      environment:
        description: "e.g. dev, staging, prod"
        type: string
        required: true
      chdir:
        description: "Terraform root module directory relative to repo root"
        type: string
        default: "infra/stack"
      aws-region:
        description: "AWS region"
        type: string
        default: "us-east-1"
      auto-approve:
        description: "Pass -auto-approve to terraform apply"
        type: boolean
        default: true
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: github-${{ github.run_id }}-${{ inputs.environment }}-apply

      - name: Terraform init
        run: terraform -chdir=${{ inputs.chdir }} init -input=false

      - name: Terraform apply (auto-approve)
        if: ${{ inputs.auto-approve }}
        run: |
          set -euo pipefail
          terraform -chdir=${{ inputs.chdir }} apply -auto-approve -input=false

      - name: Terraform apply (from plan file)
        if: ${{ !inputs.auto-approve }}
        run: |
          set -euo pipefail
          terraform -chdir=${{ inputs.chdir }} apply -input=false tfplan
