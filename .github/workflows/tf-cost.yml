name: Terraform Cost Estimation (Infracost)

on:
  workflow_call:
    inputs:
      terraform-version:
        description: "Terraform version to use"
        type: string
        default: "1.9.8"
      path:
        description: "Terraform directory to estimate"
        type: string
        default: "infra/stack"
      aws-region:
        description: "AWS region"
        type: string
        default: "us-east-1"
      dry-run:
        description: "If true, validates configuration without requiring Infracost/AWS credentials"
        type: boolean
        default: false
    secrets:
      INFRACOST_API_KEY:
        required: false
      AWS_ROLE_ARN:
        required: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  cost:
    name: Cost estimation (infracost)
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@a7b7b6e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2e2 # v4.0.0 (replace with actual latest v4 SHA)
        with:
          terraform_version: ${{ inputs.terraform-version }}

      # Always install infracost CLI and add to PATH, regardless of dry-run
      - name: Install Infracost CLI
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
          echo "$HOME/.infracost/bin" >> "$GITHUB_PATH"

      - name: Setup Infracost (action, optional)
        if: ${{ !inputs.dry-run }}
        uses: infracost/actions/setup@d51fc54d23c9ad90f984b884257bd96dc2625067 # v4.1.0
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Require INFRACOST_API_KEY and AWS_ROLE_ARN (when dry-run=false)
        if: ${{ !inputs.dry-run }}
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail
          if [[ -z "$INFRACOST_API_KEY" ]]; then
            echo "::error::Missing required secret INFRACOST_API_KEY"
            exit 1
          fi
          if [[ -z "$AWS_ROLE_ARN" ]]; then
            echo "::error::Missing required secret AWS_ROLE_ARN"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ !inputs.dry-run }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: github-${{ github.run_id }}-infracost


      - name: Install Infracost CLI (manual fallback)
        if: ${{ !inputs.dry-run }}
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
          echo "$HOME/.infracost/bin" >> "$GITHUB_PATH"

      - name: Run Infracost breakdown
        if: ${{ !inputs.dry-run }}
        env:
          PATH_INPUT: ${{ inputs.path }}
        run: |
          set -euo pipefail
          infracost breakdown \
            --path="$PATH_INPUT" \
            --format=json \
            --out-file=infracost.json

      - name: Post Infracost comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          infracost comment github \
            --path=infracost.json \
            --repo="$GH_REPO" \
            --github-token="$GH_TOKEN" \
            --pull-request="$PR_NUMBER" \
            --behavior=update

      - name: Dry-run note
        if: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          echo "dry-run=true: skipping Infracost and AWS credential steps."
