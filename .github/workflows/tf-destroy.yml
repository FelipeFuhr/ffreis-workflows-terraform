name: Terraform Destroy

# NOTE: Callers should gate this workflow behind workflow_dispatch to prevent
# accidental destruction. This reusable workflow only performs the destroy;
# triggering control must be enforced in the caller.

on:
  workflow_call:
    inputs:
      terraform-version:
        description: "Terraform version to use"
        type: string
        default: "1.9.8"
      environment:
        description: "e.g. dev, staging, prod"
        type: string
        required: true
      chdir:
        description: "Terraform root module directory relative to repo root"
        type: string
        default: "infra/stack"
      aws-region:
        description: "AWS region"
        type: string
        default: "us-east-1"
      target:
        description: "Optional -target=resource to scope destroy"
        type: string
        default: ""
      dry-run:
        description: "If true, validates configuration without requiring AWS credentials/state"
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        required: false

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  destroy:
    name: Destroy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Require AWS_ROLE_ARN (when dry-run=false)
        if: ${{ !inputs.dry-run }}
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail
          if [[ -z "$AWS_ROLE_ARN" ]]; then
            echo "::error::Missing required secret AWS_ROLE_ARN"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        if: ${{ !inputs.dry-run }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: github-${{ github.run_id }}-${{ inputs.environment }}-destroy

      - name: Terraform init
        env:
          CHDIR: ${{ inputs.chdir }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          if [[ "$DRY_RUN" == "true" ]]; then
            terraform -chdir="$CHDIR" init -backend=false -input=false
          else
            terraform -chdir="$CHDIR" init -input=false
          fi

      - name: Terraform validate (dry-run)
        if: ${{ inputs.dry-run }}
        env:
          CHDIR: ${{ inputs.chdir }}
        run: |
          set -euo pipefail
          terraform -chdir="$CHDIR" validate -no-color

      - name: Terraform destroy (with target)
        if: ${{ inputs.target != '' && !inputs.dry-run }}
        env:
          CHDIR: ${{ inputs.chdir }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          terraform -chdir="$CHDIR" destroy \
            -auto-approve \
            -input=false \
            -target="$TARGET"

      - name: Terraform destroy (full)
        if: ${{ inputs.target == '' && !inputs.dry-run }}
        env:
          CHDIR: ${{ inputs.chdir }}
        run: |
          set -euo pipefail
          terraform -chdir="$CHDIR" destroy \
            -auto-approve \
            -input=false
