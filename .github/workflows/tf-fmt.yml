name: Terraform Format Check

on:
  workflow_call:
    inputs:
      terraform-version:
        description: "Terraform version to use"
        type: string
        default: "1.9.8"
      working-directory:
        description: "Directory to run terraform fmt -check -recursive against"
        type: string
        default: "."

permissions:
  contents: read

jobs:
  fmt:
    name: Format (terraform fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - name: Check formatting
        run: terraform fmt -check -recursive ${{ inputs.working-directory }}
