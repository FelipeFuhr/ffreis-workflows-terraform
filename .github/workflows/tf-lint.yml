name: Terraform Lint

on:
  workflow_call:
    inputs:
      tflint-version:
        description: "TFLint version to use"
        type: string
        default: "v0.50.3"
      lint-path:
        description: "Directory to lint, e.g. 'infra/' or '.'"
        type: string
        default: "."
      tflint-config:
        description: "Path to tflint config file"
        type: string
        default: ".tflint.hcl"

permissions:
  contents: read

jobs:
  lint:
    name: Lint (tflint)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
        with:
          tflint_version: ${{ inputs.tflint-version }}
          cache: true
          tflint_config_path: ${{ inputs.tflint-config }}

      - name: Init TFLint
        working-directory: ${{ inputs.lint-path }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init

      - name: Run TFLint
        working-directory: ${{ inputs.lint-path }}
        run: tflint --recursive --format compact
