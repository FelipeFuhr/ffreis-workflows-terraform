name: Terraform Security Scan (Trivy)

on:
  workflow_call:
    inputs:
      scan-ref:
        description: "Directory to scan, e.g. 'infra/' or '.'"
        type: string
        default: "."
      severity:
        description: "Comma-separated list of severities to report"
        type: string
        default: "HIGH,CRITICAL"
      exit-code:
        description: "Exit code when vulnerabilities are found"
        type: number
        default: 1

permissions:
  contents: read

jobs:
  security:
    name: Security (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy (Terraform config scan)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: config
          scan-ref: ${{ inputs.scan-ref }}
          exit-code: ${{ inputs.exit-code }}
          severity: ${{ inputs.severity }}
          format: table
