name: Terraform SonarCloud

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Terraform configuration to scan"
        type: string
        default: "."
      sonar-project-key:
        description: "SonarCloud project key (defaults to repository name)"
        type: string
        default: ""
      sonar-organization:
        description: "SonarCloud organization slug"
        type: string
        default: ""
    secrets:
      SONAR_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    if: vars.SONAR_ENABLED != 'false'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ inputs.working-directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar-project-key || github.event.repository.name }}
            -Dsonar.organization=${{ inputs.sonar-organization || vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
