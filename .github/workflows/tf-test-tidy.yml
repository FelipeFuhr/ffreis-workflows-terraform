name: Terraform Test Tidy (Terratest)

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use"
        type: string
        default: "1.21"
      test-dir:
        description: "Directory containing go.mod for tests"
        type: string
        default: "test"

permissions:
  contents: read

jobs:
  test-tidy:
    name: Test module (tidy + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache-dependency-path: ${{ inputs.test-dir }}/go.sum

      - name: Verify go.mod is tidy
        env:
          TEST_DIR: ${{ inputs.test-dir }}
        run: |
          set -euo pipefail
          cd "$TEST_DIR"
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Compile test package (no AWS needed)
        env:
          TEST_DIR: ${{ inputs.test-dir }}
        run: cd "$TEST_DIR" && go build ./...
